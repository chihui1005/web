<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>皮卡丘玩偶旗舰店（示例）</title>
    <style>
      :root{
        --bg:#f5f7fb;
        --card:#ffffff;
        --text:#111827;
        --muted:#6b7280;
        --line:#e5e7eb;
        --brand:#ff5000; /* 淘宝橙 */
        --brand-2:#ff7a00;
        --ok:#16a34a;
        --warn:#f59e0b;
        --danger:#ef4444;
        --shadow: 0 10px 30px rgba(17,24,39,.08);
        --radius: 14px;
      }
      *{box-sizing:border-box}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        color:var(--text);
        background:var(--bg);
      }
      a{color:inherit;text-decoration:none}
      button,input,select{font:inherit}

      /* top bar */
      .topbar{
        position:sticky; top:0; z-index:50;
        background: linear-gradient(90deg, var(--brand), var(--brand-2));
        color:#fff;
        box-shadow: 0 6px 16px rgba(255,80,0,.22);
      }
      .topbar .inner{
        max-width: 1180px;
        margin: 0 auto;
        padding: 14px 16px;
        display:flex;
        align-items:center;
        gap:12px;
      }
      .logo{
        display:flex; align-items:center; gap:10px;
        min-width: 220px;
      }
      .logo-badge{
        width: 34px; height: 34px;
        border-radius: 10px;
        background: rgba(255,255,255,.18);
        border: 1px solid rgba(255,255,255,.25);
        display:grid; place-items:center;
        box-shadow: inset 0 1px 0 rgba(255,255,255,.22);
      }
      .logo-title{
        line-height:1.1;
      }
      .logo-title b{display:block; font-size:14px}
      .logo-title span{display:block; font-size:12px; opacity:.9}
      .search{
        flex:1;
        display:flex;
        align-items:center;
        gap:10px;
        background: rgba(255,255,255,.16);
        border: 1px solid rgba(255,255,255,.22);
        padding: 8px 10px;
        border-radius: 999px;
      }
      .search input{
        flex:1;
        border:none;
        outline:none;
        background:transparent;
        color:#fff;
      }
      .search input::placeholder{color: rgba(255,255,255,.85)}
      .chip{
        height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.25);
        background: rgba(255,255,255,.14);
        color:#fff;
        font-size: 12px;
        font-weight: 800;
        cursor:pointer;
      }
      .top-actions{
        display:flex;
        align-items:center;
        gap:10px;
      }
      .iconbtn{
        position:relative;
        display:inline-flex;
        align-items:center;
        gap:10px;
        height: 36px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,.25);
        background: rgba(255,255,255,.14);
        color:#fff;
        font-weight: 900;
        cursor:pointer;
      }
      .badge{
        position:absolute;
        right: -6px;
        top: -6px;
        min-width: 20px;
        height: 20px;
        padding: 0 6px;
        border-radius: 999px;
        background:#111827;
        color:#fff;
        display:grid;
        place-items:center;
        font-size: 12px;
        font-weight: 900;
        border: 2px solid rgba(255,255,255,.7);
      }

      /* layout */
      .wrap{
        max-width: 1180px;
        margin: 16px auto 48px;
        padding: 0 16px;
        display:grid;
        grid-template-columns: 260px 1fr;
        gap: 14px;
      }
      @media (max-width: 980px){
        .wrap{grid-template-columns: 1fr}
        .logo{min-width:auto}
      }
      .panel{
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .panel-hd{
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
      }
      .panel-hd .t{font-weight: 950; font-size: 13px}
      .panel-hd .s{color:var(--muted); font-size:12px; font-weight:700}
      .panel-bd{padding: 12px 14px}

      .filters{
        display:grid;
        gap: 12px;
      }
      .field label{
        display:block;
        font-size: 12px;
        font-weight: 900;
        color:#111827;
        margin-bottom: 6px;
      }
      .field .ctrl{
        width:100%;
        height: 36px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 0 12px;
        outline:none;
        background:#fff;
      }
      .seg{
        display:flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .seg button{
        height: 30px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        font-size: 12px;
        font-weight: 850;
        color:#111827;
        cursor:pointer;
      }
      .seg button.on{
        border-color: rgba(255,80,0,.28);
        background: rgba(255,80,0,.10);
        color: #9a3412;
      }
      .hint{
        font-size: 12px;
        color: var(--muted);
        font-weight: 700;
      }
      .kpi{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 10px;
      }
      .kpi .box{
        border: 1px dashed #e2e8f0;
        border-radius: 12px;
        padding: 10px;
        background:#fbfdff;
      }
      .kpi .box b{display:block; font-size:12px; font-weight: 950}
      .kpi .box span{display:block; margin-top: 6px; font-size: 12px; color: var(--muted); font-weight: 800}

      /* list */
      .listbar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        margin-bottom: 12px;
      }
      .listbar .title{
        display:flex; align-items:baseline; gap: 10px; flex-wrap: wrap;
      }
      .listbar .title h1{
        margin:0;
        font-size: 16px;
        font-weight: 1000;
      }
      .pill{
        height: 22px;
        padding: 0 10px;
        border-radius: 999px;
        border: 1px solid #ffd6c2;
        background: #fff2ea;
        color: #9a3412;
        font-size: 12px;
        font-weight: 900;
        display:inline-flex;
        align-items:center;
      }
      .sort{
        display:flex; align-items:center; gap: 8px; flex-wrap: wrap;
      }
      .sort select{
        height: 34px;
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 0 10px;
        font-size: 12px;
        font-weight: 900;
        background:#fff;
      }
      .grid{
        display:grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      @media (max-width: 1060px){ .grid{grid-template-columns: repeat(2, 1fr);} }
      @media (max-width: 620px){ .grid{grid-template-columns: 1fr;} }
      .card{
        background:#fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow:hidden;
        box-shadow: 0 10px 22px rgba(17,24,39,.06);
        display:flex;
        flex-direction:column;
        min-height: 340px;
      }
      .thumb{
        height: 160px;
        background: #f8fafc;
        position:relative;
      }
      .thumb::after{
        content:"皮卡丘";
        position:absolute;
        left:12px; top: 12px;
        height: 26px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(17,24,39,.82);
        color:#fff;
        font-size: 12px;
        font-weight: 900;
        display:flex;
        align-items:center;
      }
      .thumb img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .thumb.noimg{
        background: radial-gradient(120px 120px at 45% 35%, #fff3b0 0%, #ffe066 45%, #ffd43b 100%);
      }
      .thumb.noimg::before{
        content: "缺少商品图：请在 assets/ 目录放置\\A例如 assets/pikachu-01.jpg";
        white-space: pre;
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 12px;
        padding: 10px 10px;
        border-radius: 12px;
        background: rgba(255,255,255,.82);
        border: 1px solid rgba(226,232,240,.9);
        color: #111827;
        font-size: 12px;
        font-weight: 900;
        line-height: 1.35;
      }
      .cbd{
        padding: 12px 12px 12px;
        display:flex;
        flex-direction:column;
        gap: 10px;
        flex:1;
      }
      .name{
        font-weight: 950;
        font-size: 13px;
        line-height: 1.35;
        min-height: 36px;
      }
      .meta{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
      }
      .price{
        font-weight: 1100;
        color: var(--brand);
        font-size: 18px;
        letter-spacing: .2px;
      }
      .price small{
        font-size: 12px;
        font-weight: 900;
        margin-right: 2px;
      }
      .sub{
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
      }
      .tags{
        display:flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .tag{
        height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        border: 1px solid #e2e8f0;
        background:#f8fafc;
        color:#334155;
        font-size: 12px;
        font-weight: 900;
        display:inline-flex;
        align-items:center;
      }
      .tag.hot{border-color:#ffd6c2; background:#fff2ea; color:#9a3412}
      .tag.new{border-color:#c7f9d4; background:#ecfdf5; color:#065f46}
      .actions{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
        margin-top:auto;
      }
      .btn{
        height: 34px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background:#fff;
        font-size: 12px;
        font-weight: 950;
        color:#111827;
        cursor:pointer;
      }
      .btn.primary{
        border-color: rgba(255,80,0,.25);
        background: linear-gradient(180deg, rgba(255,80,0,.10), rgba(255,80,0,.06));
        color: #9a3412;
      }
      .btn.brand{
        border-color: rgba(255,80,0,.35);
        background: linear-gradient(180deg, var(--brand), #ff6a00);
        color:#fff;
      }
      .btn:disabled{opacity:.55; cursor:not-allowed}

      /* drawer */
      .overlay{
        position:fixed; inset:0;
        background: rgba(17,24,39,.48);
        display:none;
        z-index: 90;
      }
      .overlay.show{display:block}
      .drawer{
        position:fixed;
        right: 0; top: 0;
        height: 100vh;
        width: min(420px, 92vw);
        background:#fff;
        border-left: 1px solid var(--line);
        box-shadow: -18px 0 40px rgba(17,24,39,.15);
        transform: translateX(100%);
        transition: transform .2s ease;
        z-index: 100;
        display:flex;
        flex-direction:column;
      }
      .drawer.show{transform: translateX(0)}
      .drawer-hd{
        padding: 14px;
        border-bottom: 1px solid var(--line);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 10px;
      }
      .drawer-hd b{font-size: 14px}
      .close{
        width: 34px; height: 34px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background:#fff;
        cursor:pointer;
        font-weight: 1000;
      }
      .drawer-bd{
        padding: 12px 14px;
        overflow:auto;
        flex:1;
      }
      .cart-item{
        display:grid;
        grid-template-columns: 60px 1fr;
        gap: 10px;
        padding: 10px;
        border: 1px solid #f1f5f9;
        border-radius: 14px;
        background:#fff;
      }
      .cart-item + .cart-item{margin-top: 10px}
      .mini{
        width: 60px; height: 60px;
        border-radius: 14px;
        background: #f8fafc;
        display:grid;
        place-items:center;
        overflow: hidden;
        border: 1px solid #eef2f7;
      }
      .mini img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .cart-name{font-weight: 950; font-size: 12px; line-height: 1.35}
      .cart-meta{display:flex; align-items:center; justify-content:space-between; gap: 10px; margin-top: 6px}
      .qty{
        display:inline-flex;
        align-items:center;
        border: 1px solid var(--line);
        border-radius: 12px;
        overflow:hidden;
        height: 30px;
      }
      .qty button{
        width: 34px; height: 30px;
        border:none;
        background:#fff;
        cursor:pointer;
        font-weight: 1000;
      }
      .qty input{
        width: 42px;
        height: 30px;
        border:none;
        outline:none;
        text-align:center;
        font-weight: 950;
        font-size: 12px;
      }
      .linkbtn{
        border:none;
        background:transparent;
        color:#2563eb;
        font-size: 12px;
        font-weight: 950;
        cursor:pointer;
        padding: 0;
      }
      .drawer-ft{
        padding: 12px 14px 14px;
        border-top: 1px solid var(--line);
        background: #fff;
      }
      .sumrow{
        display:flex; align-items:center; justify-content:space-between;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 900;
        color: var(--muted);
      }
      .sumrow b{color: var(--text); font-size: 16px}
      .ft-actions{
        display:flex;
        gap: 10px;
      }
      .ft-actions .btn{flex:1}

      /* checkout modal */
      .modal{
        position:fixed;
        inset: 0;
        display:none;
        z-index: 110;
        align-items:center;
        justify-content:center;
        padding: 18px;
      }
      .modal.show{display:flex}
      .modal .box{
        width: min(860px, 100%);
        background:#fff;
        border-radius: 18px;
        box-shadow: 0 30px 80px rgba(17,24,39,.25);
        border: 1px solid var(--line);
        overflow:hidden;
      }
      .modal-hd{
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        display:flex; align-items:center; justify-content:space-between; gap: 12px;
      }
      .modal-hd b{font-size: 14px}
      .modal-bd{
        padding: 14px 16px 16px;
        display:grid;
        grid-template-columns: 1.2fr .8fr;
        gap: 14px;
      }
      @media (max-width: 900px){ .modal-bd{grid-template-columns: 1fr} }
      .formgrid{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      @media (max-width: 620px){ .formgrid{grid-template-columns: 1fr} }
      .formgrid .field .ctrl{border-radius: 14px}
      .paymethods{
        display:flex; gap: 8px; flex-wrap: wrap;
      }
      .paymethods button{
        height: 34px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background:#fff;
        cursor:pointer;
        font-weight: 950;
        font-size: 12px;
      }
      .paymethods button.on{
        border-color: rgba(255,80,0,.28);
        background: rgba(255,80,0,.10);
        color: #9a3412;
      }
      .order{
        border: 1px solid #f1f5f9;
        border-radius: 16px;
        padding: 12px;
        background: #fbfdff;
      }
      .order h3{margin:0 0 10px; font-size: 13px}
      .order .line{display:flex; justify-content:space-between; gap: 10px; padding: 8px 0; font-size: 12px; font-weight: 850; color: var(--muted)}
      .order .line + .line{border-top: 1px dashed #e2e8f0}
      .order .line b{color: var(--text)}
      .notice{
        margin-top: 10px;
        font-size: 12px;
        font-weight: 750;
        color: var(--muted);
        line-height: 1.5;
      }
      .notice b{color:#111827}
      .modal-ft{
        padding: 12px 16px 16px;
        border-top: 1px solid var(--line);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap: 12px;
        background:#fff;
      }
      .toast{
        position: fixed;
        left: 50%;
        bottom: 18px;
        transform: translateX(-50%);
        background: rgba(17,24,39,.92);
        color:#fff;
        padding: 10px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        display:none;
        z-index: 200;
        max-width: 92vw;
      }
      .toast.show{display:block}
    </style>
  </head>
  <body>
    <div class="topbar">
      <div class="inner">
        <div class="logo" title="示例站点（非真实淘宝/非真实支付）">
          <div class="logo-badge">🧸</div>
          <div class="logo-title">
            <b>皮卡丘玩偶旗舰店</b>
            <span>淘宝风格示例页</span>
          </div>
        </div>

        <div class="search" role="search">
          <input id="q" type="search" placeholder="搜“皮卡丘 玩偶 80cm”" autocomplete="off" />
          <button class="chip" id="btnSearch" type="button">搜索</button>
        </div>

        <div class="top-actions">
          <button class="iconbtn" id="btnCart" type="button" aria-label="购物车">
            购物车
            <span class="badge" id="cartCount">0</span>
          </button>
        </div>
      </div>
    </div>

    <div class="wrap">
      <!-- left filters -->
      <aside class="panel">
        <div class="panel-hd">
          <div>
            <div class="t">筛选</div>
            <div class="s">像淘宝一样先筛后逛</div>
          </div>
          <button class="btn" id="btnReset" type="button">重置</button>
        </div>
        <div class="panel-bd">
          <div class="filters">
            <div class="field">
              <label>价格区间</label>
              <select class="ctrl" id="priceBand">
                <option value="all">全部</option>
                <option value="0-49">¥0 - ¥49</option>
                <option value="50-99">¥50 - ¥99</option>
                <option value="100-199">¥100 - ¥199</option>
                <option value="200-9999">¥200+</option>
              </select>
            </div>

            <div class="field">
              <label>规格</label>
              <div class="seg" id="segSize">
                <button type="button" data-size="all" class="on">全部</button>
                <button type="button" data-size="20cm">20cm</button>
                <button type="button" data-size="40cm">40cm</button>
                <button type="button" data-size="60cm">60cm</button>
                <button type="button" data-size="80cm">80cm</button>
              </div>
              <div class="hint">提示：点击切换规格筛选</div>
            </div>

            <div class="field">
              <label>发货</label>
              <div class="seg" id="segShip">
                <button type="button" data-ship="all" class="on">全部</button>
                <button type="button" data-ship="24h">24小时内</button>
                <button type="button" data-ship="48h">48小时内</button>
              </div>
            </div>

            <div class="kpi">
              <div class="box">
                <b id="kpiMatch">0</b>
                <span>当前匹配商品</span>
              </div>
              <div class="box">
                <b id="kpiCart">0</b>
                <span>购物车件数</span>
              </div>
            </div>

            <div class="hint">
              <b>说明</b>：这是静态演示站点，支付为“模拟支付”，不产生真实订单/扣款。
            </div>
          </div>
        </div>
      </aside>

      <!-- main list -->
      <main class="panel">
        <div class="panel-hd">
          <div class="listbar" style="width:100%">
            <div class="title">
              <h1>皮卡丘玩偶热卖</h1>
              <span class="pill" id="pillQuery">全部商品</span>
            </div>
            <div class="sort">
              <span class="hint">排序</span>
              <select id="sortBy" aria-label="排序">
                <option value="smart">综合</option>
                <option value="sales">销量优先</option>
                <option value="priceAsc">价格从低到高</option>
                <option value="priceDesc">价格从高到低</option>
              </select>
            </div>
          </div>
        </div>
        <div class="panel-bd">
          <div class="grid" id="grid"></div>
          <div id="empty" class="hint" style="display:none; padding: 14px 2px;">
            没有找到匹配商品，试试清空筛选或换个关键词。
          </div>
        </div>
      </main>
    </div>

    <!-- cart drawer -->
    <div class="overlay" id="overlay"></div>
    <aside class="drawer" id="drawer" aria-label="购物车抽屉">
      <div class="drawer-hd">
        <div>
          <b>购物车</b>
          <div class="hint">已选 <span id="cartCount2">0</span> 件</div>
        </div>
        <button class="close" id="btnCloseCart" type="button" aria-label="关闭">×</button>
      </div>
      <div class="drawer-bd" id="cartList"></div>
      <div class="drawer-ft">
        <div class="sumrow">
          <span>合计</span>
          <div><small style="font-weight:900;color:var(--muted)">¥</small><b id="cartTotal">0.00</b></div>
        </div>
        <div class="ft-actions">
          <button class="btn" id="btnClear" type="button">清空</button>
          <button class="btn brand" id="btnCheckout" type="button">去结算</button>
        </div>
      </div>
    </aside>

    <!-- checkout modal -->
    <div class="modal" id="modal">
      <div class="box">
        <div class="modal-hd">
          <b>确认订单</b>
          <button class="close" id="btnCloseModal" type="button" aria-label="关闭">×</button>
        </div>
        <div class="modal-bd">
          <section>
            <div class="field">
              <label>收货信息</label>
              <div class="formgrid">
                <div class="field">
                  <label class="hint">收货人</label>
                  <input class="ctrl" id="fName" placeholder="例如：张三" />
                </div>
                <div class="field">
                  <label class="hint">手机号</label>
                  <input class="ctrl" id="fPhone" placeholder="例如：138****8888" />
                </div>
                <div class="field" style="grid-column: 1 / -1;">
                  <label class="hint">收货地址</label>
                  <input class="ctrl" id="fAddr" placeholder="例如：北京市朝阳区某某路 88 号" />
                </div>
              </div>
            </div>

            <div class="field" style="margin-top:12px;">
              <label>支付方式</label>
              <div class="paymethods" id="payMethods">
                <button type="button" class="on" data-pay="alipay">支付宝（模拟）</button>
                <button type="button" data-pay="wechat">微信支付（模拟）</button>
                <button type="button" data-pay="card">银行卡（模拟）</button>
              </div>
            </div>

            <div class="notice">
              <b>提示：</b>该页面仅用于原型演示，“支付”会生成一个本地的模拟订单号，不会产生真实交易。
            </div>
          </section>

          <aside class="order">
            <h3>订单信息</h3>
            <div class="line"><span>商品金额</span><b id="oGoods">¥0.00</b></div>
            <div class="line"><span>运费</span><b id="oShip">¥0.00</b></div>
            <div class="line"><span>优惠</span><b id="oDiscount">-¥0.00</b></div>
            <div class="line" style="color:#111827"><span>应付</span><b id="oPay">¥0.00</b></div>
          </aside>
        </div>
        <div class="modal-ft">
          <div class="hint">下单后可在本页看到“模拟支付结果”</div>
          <div style="display:flex; gap:10px;">
            <button class="btn" id="btnBackToCart" type="button">返回购物车</button>
            <button class="btn brand" id="btnPay" type="button">提交并支付</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // ---------- data ----------
      const PRODUCTS = [
        { id: "p1", name: "皮卡丘毛绒玩偶 20cm｜软萌小挂件", price: 29.9, size: "20cm", ship: "24h", sales: 23841, tags: ["new"], img: "assets/pikachu-01.jpg" },
        { id: "p2", name: "皮卡丘毛绒玩偶 40cm｜抱抱款", price: 69.0, size: "40cm", ship: "24h", sales: 16890, tags: ["hot"], img: "assets/pikachu-02.jpg" },
        { id: "p3", name: "皮卡丘毛绒玩偶 60cm｜大号靠枕", price: 129.0, size: "60cm", ship: "48h", sales: 9421, tags: ["hot"], img: "assets/pikachu-03.jpg" },
        { id: "p4", name: "皮卡丘玩偶 80cm｜超大抱枕（礼盒装）", price: 219.0, size: "80cm", ship: "48h", sales: 4210, tags: ["hot","new"], img: "assets/pikachu-04.jpg" },
        { id: "p5", name: "皮卡丘玩偶 40cm｜带围巾限定款", price: 79.9, size: "40cm", ship: "48h", sales: 8021, tags: ["new"], img: "assets/pikachu-05.jpg" },
        { id: "p6", name: "皮卡丘玩偶 60cm｜生日礼物套装（含贺卡）", price: 149.0, size: "60cm", ship: "24h", sales: 6238, tags: ["hot"], img: "assets/pikachu-06.jpg" },
        { id: "p7", name: "皮卡丘玩偶 20cm｜钥匙扣版（双只装）", price: 39.9, size: "20cm", ship: "24h", sales: 19330, tags: ["hot"], img: "assets/pikachu-07.jpg" },
        { id: "p8", name: "皮卡丘玩偶 80cm｜毛绒枕（加厚）", price: 199.0, size: "80cm", ship: "48h", sales: 5120, tags: [], img: "assets/pikachu-08.jpg" },
      ];

      const LS_CART = "pikachu_shop_cart_v1";
      const LS_RECENT = "pikachu_shop_recent_v1";

      // cart: { [productId]: qty }
      function loadCart(){
        try{
          const raw = localStorage.getItem(LS_CART);
          return raw ? JSON.parse(raw) : {};
        }catch{ return {}; }
      }
      function saveCart(cart){
        localStorage.setItem(LS_CART, JSON.stringify(cart));
      }
      function loadRecent(){
        try{
          const raw = localStorage.getItem(LS_RECENT);
          return raw ? JSON.parse(raw) : [];
        }catch{ return []; }
      }
      function saveRecent(list){
        localStorage.setItem(LS_RECENT, JSON.stringify(list.slice(0, 8)));
      }

      function money(n){ return (Math.round(n * 100) / 100).toFixed(2); }
      function cartCount(cart){ return Object.values(cart).reduce((a,b)=>a+b,0); }
      function cartTotal(cart){
        let sum = 0;
        for (const [pid, qty] of Object.entries(cart)){
          const p = PRODUCTS.find(x=>x.id===pid);
          if (p) sum += p.price * qty;
        }
        return sum;
      }

      // ---------- elements ----------
      const el = (id)=>document.getElementById(id);
      const grid = el("grid");
      const empty = el("empty");
      const q = el("q");
      const btnSearch = el("btnSearch");
      const btnReset = el("btnReset");
      const priceBand = el("priceBand");
      const segSize = el("segSize");
      const segShip = el("segShip");
      const sortBy = el("sortBy");
      const pillQuery = el("pillQuery");

      const btnCart = el("btnCart");
      const overlay = el("overlay");
      const drawer = el("drawer");
      const btnCloseCart = el("btnCloseCart");
      const cartList = el("cartList");
      const cartCountEl = el("cartCount");
      const cartCount2 = el("cartCount2");
      const cartTotalEl = el("cartTotal");
      const btnClear = el("btnClear");
      const btnCheckout = el("btnCheckout");
      const kpiMatch = el("kpiMatch");
      const kpiCart = el("kpiCart");

      const modal = el("modal");
      const btnCloseModal = el("btnCloseModal");
      const btnBackToCart = el("btnBackToCart");
      const btnPay = el("btnPay");
      const payMethods = el("payMethods");
      const fName = el("fName");
      const fPhone = el("fPhone");
      const fAddr = el("fAddr");
      const oGoods = el("oGoods");
      const oShip = el("oShip");
      const oDiscount = el("oDiscount");
      const oPay = el("oPay");

      const toast = el("toast");

      // ---------- state ----------
      let state = {
        query: "",
        size: "all",
        ship: "all",
        price: "all",
        sort: "smart",
        cart: loadCart(),
        pay: "alipay",
      };

      // ---------- ui helpers ----------
      let toastTimer = null;
      function showToast(msg){
        toast.textContent = msg;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(()=>toast.classList.remove("show"), 1600);
      }
      function setSegOn(container, value, attr){
        const btns = [...container.querySelectorAll("button")];
        for (const b of btns){
          const v = b.getAttribute(attr);
          b.classList.toggle("on", v === value);
        }
      }

      function render(){
        // compute list
        const query = state.query.trim().toLowerCase();
        let list = PRODUCTS.filter(p=>{
          if (query && !p.name.toLowerCase().includes(query)) return false;
          if (state.size !== "all" && p.size !== state.size) return false;
          if (state.ship !== "all" && p.ship !== state.ship) return false;
          if (state.price !== "all"){
            const [a,b] = state.price.split("-").map(Number);
            if (!(p.price >= a && p.price <= b)) return false;
          }
          return true;
        });

        // sort
        if (state.sort === "sales") list.sort((a,b)=>b.sales-a.sales);
        else if (state.sort === "priceAsc") list.sort((a,b)=>a.price-b.price);
        else if (state.sort === "priceDesc") list.sort((a,b)=>b.price-a.price);
        else {
          // smart: hot/new > sales > price friendliness
          list.sort((a,b)=>{
            const ah = a.tags.includes("hot") ? 1 : 0;
            const bh = b.tags.includes("hot") ? 1 : 0;
            if (ah !== bh) return bh - ah;
            const an = a.tags.includes("new") ? 1 : 0;
            const bn = b.tags.includes("new") ? 1 : 0;
            if (an !== bn) return bn - an;
            return (b.sales - a.sales) || (a.price - b.price);
          });
        }

        // render cards
        grid.innerHTML = "";
        for (const p of list){
          const tagsHtml = (p.tags || []).map(t=>{
            if (t === "hot") return '<span class="tag hot">热卖</span>';
            if (t === "new") return '<span class="tag new">新品</span>';
            return '<span class="tag">'+t+'</span>';
          }).join("") + `<span class="tag">${p.size}</span>` + `<span class="tag">发货${p.ship}</span>`;
          const card = document.createElement("div");
          card.className = "card";
          card.innerHTML = `
            <div class="thumb" role="img" aria-label="皮卡丘玩偶图片占位">
              <img src="${escapeHtml(p.img || "")}" alt="皮卡丘玩偶商品图" loading="lazy" referrerpolicy="no-referrer" onerror="this.closest('.thumb').classList.add('noimg'); this.remove();" />
            </div>
            <div class="cbd">
              <div class="name">${escapeHtml(p.name)}</div>
              <div class="tags">${tagsHtml}</div>
              <div class="meta">
                <div class="price"><small>¥</small>${money(p.price)}</div>
                <div class="sub">月销 ${p.sales.toLocaleString()}</div>
              </div>
              <div class="actions">
                <button class="btn primary" type="button" data-buy="${p.id}">立即购买</button>
                <button class="btn brand" type="button" data-add="${p.id}">加入购物车</button>
              </div>
            </div>
          `;
          grid.appendChild(card);
        }
        empty.style.display = list.length ? "none" : "block";

        // pills/kpis
        pillQuery.textContent = query ? `搜索：${state.query}` : "全部商品";
        kpiMatch.textContent = String(list.length);

        // cart header
        const cnt = cartCount(state.cart);
        cartCountEl.textContent = String(cnt);
        cartCount2.textContent = String(cnt);
        kpiCart.textContent = String(cnt);
        cartTotalEl.textContent = money(cartTotal(state.cart));

        // checkout availability
        btnCheckout.disabled = cnt === 0;
        btnClear.disabled = cnt === 0;
      }

      function escapeHtml(s){
        return String(s)
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;")
          .replaceAll('"',"&quot;")
          .replaceAll("'","&#39;");
      }

      function renderCart(){
        const entries = Object.entries(state.cart);
        if (!entries.length){
          cartList.innerHTML = `<div class="hint" style="padding: 10px 2px;">购物车还是空的，去挑点皮卡丘吧。</div>`;
          cartTotalEl.textContent = "0.00";
          render();
          return;
        }
        cartList.innerHTML = "";
        for (const [pid, qty] of entries){
          const p = PRODUCTS.find(x=>x.id===pid);
          if (!p) continue;
          const item = document.createElement("div");
          item.className = "cart-item";
          item.innerHTML = `
            <div class="mini">
              <img src="${escapeHtml(p.img || "")}" alt="商品缩略图" loading="lazy" referrerpolicy="no-referrer" onerror="this.remove();" />
            </div>
            <div>
              <div class="cart-name">${escapeHtml(p.name)}</div>
              <div class="cart-meta">
                <div class="sub"><span style="color:var(--brand);font-weight:1000">¥${money(p.price)}</span> / 件</div>
                <button class="linkbtn" type="button" data-remove="${pid}">删除</button>
              </div>
              <div class="cart-meta" style="margin-top:10px;">
                <div class="qty" aria-label="数量">
                  <button type="button" data-dec="${pid}">-</button>
                  <input value="${qty}" inputmode="numeric" pattern="[0-9]*" data-qty="${pid}" />
                  <button type="button" data-inc="${pid}">+</button>
                </div>
                <div class="sub">小计 <b style="color:#111827">¥${money(p.price * qty)}</b></div>
              </div>
            </div>
          `;
          cartList.appendChild(item);
        }
        cartTotalEl.textContent = money(cartTotal(state.cart));
        render();
      }

      function openCart(){
        overlay.classList.add("show");
        drawer.classList.add("show");
        renderCart();
      }
      function closeCart(){
        overlay.classList.remove("show");
        drawer.classList.remove("show");
      }
      function openModal(){
        // prepare order summary
        const goods = cartTotal(state.cart);
        const ship = goods >= 99 ? 0 : 8;
        const discount = goods >= 199 ? 20 : 0;
        const pay = Math.max(0, goods + ship - discount);
        oGoods.textContent = `¥${money(goods)}`;
        oShip.textContent = `¥${money(ship)}`;
        oDiscount.textContent = `-¥${money(discount)}`;
        oPay.textContent = `¥${money(pay)}`;
        modal.classList.add("show");
        overlay.classList.add("show");
      }
      function closeModal(){
        modal.classList.remove("show");
        // keep overlay if cart drawer still open
        if (!drawer.classList.contains("show")) overlay.classList.remove("show");
      }

      function addToCart(pid, n=1){
        state.cart[pid] = (state.cart[pid] || 0) + n;
        if (state.cart[pid] > 99) state.cart[pid] = 99;
        saveCart(state.cart);
        showToast("已加入购物车");
        render();
      }

      // ---------- events ----------
      btnSearch.addEventListener("click", ()=>{
        state.query = q.value.trim();
        if (state.query){
          const recent = loadRecent();
          const next = [state.query, ...recent.filter(x=>x!==state.query)];
          saveRecent(next);
        }
        render();
      });
      q.addEventListener("keydown", (e)=>{
        if (e.key === "Enter") btnSearch.click();
      });

      priceBand.addEventListener("change", ()=>{
        state.price = priceBand.value;
        render();
      });
      segSize.addEventListener("click", (e)=>{
        const b = e.target.closest("button");
        if (!b) return;
        state.size = b.dataset.size;
        setSegOn(segSize, state.size, "data-size");
        render();
      });
      segShip.addEventListener("click", (e)=>{
        const b = e.target.closest("button");
        if (!b) return;
        state.ship = b.dataset.ship;
        setSegOn(segShip, state.ship, "data-ship");
        render();
      });
      sortBy.addEventListener("change", ()=>{
        state.sort = sortBy.value;
        render();
      });

      btnReset.addEventListener("click", ()=>{
        state.query = "";
        state.size = "all";
        state.ship = "all";
        state.price = "all";
        state.sort = "smart";
        q.value = "";
        priceBand.value = "all";
        sortBy.value = "smart";
        setSegOn(segSize, "all", "data-size");
        setSegOn(segShip, "all", "data-ship");
        render();
        showToast("已重置筛选");
      });

      grid.addEventListener("click", (e)=>{
        const add = e.target.closest("[data-add]");
        const buy = e.target.closest("[data-buy]");
        if (add){
          addToCart(add.dataset.add, 1);
          return;
        }
        if (buy){
          addToCart(buy.dataset.buy, 1);
          openCart();
          openModal();
        }
      });

      btnCart.addEventListener("click", openCart);
      btnCloseCart.addEventListener("click", closeCart);
      overlay.addEventListener("click", ()=>{
        // click backdrop closes whichever is open
        if (modal.classList.contains("show")) closeModal();
        if (drawer.classList.contains("show")) closeCart();
      });

      cartList.addEventListener("click", (e)=>{
        const pid = (attr)=>e.target.closest("button")?.getAttribute(attr);
        const inc = e.target.closest("[data-inc]")?.dataset.inc;
        const dec = e.target.closest("[data-dec]")?.dataset.dec;
        const rem = e.target.closest("[data-remove]")?.dataset.remove;
        if (inc){
          state.cart[inc] = Math.min(99, (state.cart[inc]||0) + 1);
          saveCart(state.cart);
          renderCart();
        } else if (dec){
          state.cart[dec] = Math.max(1, (state.cart[dec]||1) - 1);
          saveCart(state.cart);
          renderCart();
        } else if (rem){
          delete state.cart[rem];
          saveCart(state.cart);
          renderCart();
          showToast("已删除商品");
        }
      });
      cartList.addEventListener("change", (e)=>{
        const input = e.target.closest("input[data-qty]");
        if (!input) return;
        const pid = input.dataset.qty;
        let v = parseInt(input.value, 10);
        if (Number.isNaN(v) || v < 1) v = 1;
        if (v > 99) v = 99;
        state.cart[pid] = v;
        saveCart(state.cart);
        renderCart();
      });

      btnClear.addEventListener("click", ()=>{
        state.cart = {};
        saveCart(state.cart);
        renderCart();
        showToast("购物车已清空");
      });

      btnCheckout.addEventListener("click", ()=>{
        if (cartCount(state.cart) === 0) return;
        openModal();
      });

      // modal
      btnCloseModal.addEventListener("click", closeModal);
      btnBackToCart.addEventListener("click", ()=>{
        closeModal();
        openCart();
      });

      payMethods.addEventListener("click", (e)=>{
        const b = e.target.closest("button[data-pay]");
        if (!b) return;
        state.pay = b.dataset.pay;
        [...payMethods.querySelectorAll("button")].forEach(x=>x.classList.toggle("on", x===b));
      });

      btnPay.addEventListener("click", ()=>{
        if (cartCount(state.cart) === 0){
          showToast("购物车为空");
          return;
        }
        const name = fName.value.trim();
        const phone = fPhone.value.trim();
        const addr = fAddr.value.trim();
        if (!name || !phone || !addr){
          showToast("请完整填写收货信息");
          return;
        }
        const orderNo = "MO" + Date.now().toString().slice(-10);
        const payName = state.pay === "alipay" ? "支付宝" : state.pay === "wechat" ? "微信支付" : "银行卡";
        closeModal();
        closeCart();
        // show result
        showToast(`支付成功（模拟）｜订单号 ${orderNo}`);
        // clear cart
        state.cart = {};
        saveCart(state.cart);
        render();
        // soft info
        setTimeout(()=>{
          alert(
            "模拟支付完成\\n\\n" +
            "订单号：" + orderNo + "\\n" +
            "支付方式：" + payName + "（模拟）\\n" +
            "收货人：" + name + "\\n" +
            "地址：" + addr + "\\n\\n" +
            "说明：该站点仅用于原型演示，不会产生真实交易。"
          );
        }, 80);
      });

      // initial
      (function init(){
        // load recent keywords as placeholder chips (simple)
        const recent = loadRecent();
        if (recent.length){
          const first = recent[0];
          q.placeholder = `上次搜索：${first}`;
        }
        render();
      })();
    </script>
  </body>
</html>
