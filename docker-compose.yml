services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        BACKEND_BASE_IMAGE: ${BACKEND_BASE_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.cloud.tencent.com/pypi/simple}
        PIP_DEFAULT_TIMEOUT: ${PIP_DEFAULT_TIMEOUT:-120}
        PIP_RETRIES: ${PIP_RETRIES:-10}
    container_name: pikachu-shop-backend
    environment:
      PIKACHU_SHOP_SECRET: ${PIKACHU_SHOP_SECRET:-change-me-in-production}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        FRONTEND_BUILD_IMAGE: ${FRONTEND_BUILD_IMAGE:-node:22-alpine}
        FRONTEND_RUNTIME_IMAGE: ${FRONTEND_RUNTIME_IMAGE:-nginx:1.26-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://mirrors.cloud.tencent.com/npm/}
        NPM_FETCH_RETRIES: ${NPM_FETCH_RETRIES:-10}
        NPM_FETCH_RETRY_MINTIMEOUT: ${NPM_FETCH_RETRY_MINTIMEOUT:-20000}
        NPM_FETCH_RETRY_MAXTIMEOUT: ${NPM_FETCH_RETRY_MAXTIMEOUT:-120000}
        NPM_FETCH_TIMEOUT: ${NPM_FETCH_TIMEOUT:-120000}
        VITE_API_BASE_URL: /api
    container_name: pikachu-shop-frontend
    depends_on:
      - backend
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  backend_data:
