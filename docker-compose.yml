services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pikachu-shop-backend
    environment:
      PIKACHU_SHOP_SECRET: ${PIKACHU_SHOP_SECRET:-change-me-in-production}
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: pikachu-shop-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  backend_data:
